<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ELeP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="mainNav"></div>
<main class="py-4"><div class="container"><div class="row justify-content-center"><div class="col-md-5"><div class="card p-4 shadow-sm">
  <h3 class="mb-3">Login</h3>
  <div id="formAlert" class="alert d-none"></div>
  <form id="loginForm">
    <div class="form-group"><label>Email</label><input type="email" class="form-control" name="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" class="form-control" name="password" required></div>
    <button class="btn btn-primary btn-block">Login</button>
  </form>
</div></div></div></div></main>
<script src="assets/js/app.js"></script>
<script>
(async () => {
  await renderNav();
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault(); hideAlert('formAlert');
    const fd = new FormData(e.target);
    try {
      await api.login({ email: fd.get('email'), password: fd.get('password') });
      location.href = 'dashboard.html';
    } catch (err) { setAlert('formAlert', err.message); }
  });
})();
</script>
</body>
</html>
