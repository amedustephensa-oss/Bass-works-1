<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELeP MVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="mainNav"></div>
<main class="py-4"><div class="container" id="homeContent"></div></main>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
(async () => {
  await renderNav();
  const info = await api.me();
  const root = document.getElementById('homeContent');
  if (!info.user) {
    root.innerHTML = `<div class="hero p-5 mb-4 shadow">
      <h1 class="font-weight-bold">Stay Consistent With ELeP</h1>
      <p class="lead">Set weekly goals, track your progress, and get reminders.</p>
      <a href="register.html" class="btn btn-light btn-lg mr-2">Get Started</a>
      <a href="login.html" class="btn btn-outline-light btn-lg">Login</a>
    </div>`;
    return;
  }

  const goals = await api.request('api/goals.php');
  root.innerHTML = `<div class="row">
    <div class="col-md-8 mb-3"><div class="card p-4 shadow-sm"><h3>Welcome back, ${info.user.full_name} 👋</h3><p>Keep pushing your study goals.</p><a class="btn btn-primary" href="dashboard.html">Go to Dashboard</a></div></div>
    <div class="col-md-4 mb-3"><div class="card p-4 shadow-sm"><h6 class="text-muted">Progress</h6><div class="stat-value">${goals.metrics.progress}%</div><div class="progress mb-2"><div class="progress-bar" style="width:${goals.metrics.progress}%"></div></div><small>${goals.metrics.completed} of ${goals.metrics.total} tasks completed</small></div></div>
  </div>`;
})();
</script>
</body>
</html>
