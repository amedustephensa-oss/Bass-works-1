<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | ELeP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="mainNav"></div>
<main class="py-4"><div class="container">
  <div id="metrics" class="row mb-3"></div>
  <div class="row">
    <div class="col-lg-4 mb-3"><div class="card p-4 shadow-sm">
      <h5>Create Weekly Goal</h5>
      <div id="goalAlert" class="alert d-none"></div>
      <form id="goalForm">
        <div class="form-group"><label>Goal</label><input class="form-control" name="title" required></div>
        <div class="form-group"><label>Details</label><textarea class="form-control" name="details" rows="3"></textarea></div>
        <div class="form-group"><label>Deadline</label><input type="date" class="form-control" name="deadline" required></div>
        <button class="btn btn-primary btn-block">Add Goal</button>
      </form>
    </div></div>
    <div class="col-lg-8 mb-3"><div class="card p-4 shadow-sm"><h5>Your Goals</h5><div id="goalList"></div></div></div>
  </div>
</div></main>
<script src="assets/js/app.js"></script>
<script>
async function loadGoals() {
  const { goals, metrics } = await api.request('api/goals.php');
  document.getElementById('metrics').innerHTML = `
  <div class="col-md-3 mb-2"><div class="card p-3 shadow-sm"><div class="text-muted">Weekly Goals</div><div class="stat-value">${metrics.total}</div></div></div>
  <div class="col-md-3 mb-2"><div class="card p-3 shadow-sm"><div class="text-muted">Completed</div><div class="stat-value text-success">${metrics.completed}</div></div></div>
  <div class="col-md-3 mb-2"><div class="card p-3 shadow-sm"><div class="text-muted">Pending</div><div class="stat-value text-warning">${metrics.pending}</div></div></div>
  <div class="col-md-3 mb-2"><div class="card p-3 shadow-sm"><div class="text-muted">Progress</div><div class="stat-value">${metrics.progress}%</div></div></div>`;

  const goalList = document.getElementById('goalList');
  goalList.innerHTML = goals.length ? goals.map(goal => `
    <div class="border rounded p-3 mb-2 bg-light">
      <div class="d-flex justify-content-between"><div><h6>${goal.title}</h6><p class="text-muted mb-1">${goal.details || ''}</p><small>Deadline: ${goal.deadline}</small></div><span class="badge badge-${goal.status === 'completed' ? 'success' : 'warning'} p-2">${goal.status}</span></div>
      <div class="mt-2 d-flex">
        <button class="btn btn-sm btn-outline-primary mr-2" onclick="toggleGoal(${goal.id})">${goal.status === 'completed' ? 'Mark Pending' : 'Mark Completed'}</button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteGoal(${goal.id})">Delete</button>
      </div>
    </div>`).join('') : '<p class="text-muted">No goals yet. Create your first goal.</p>';
}
async function toggleGoal(id){ await api.request('api/goals.php',{method:'PATCH',body:JSON.stringify({goal_id:id})}); loadGoals(); }
async function deleteGoal(id){ if(confirm('Delete this goal?')){ await api.request('api/goals.php',{method:'DELETE',body:JSON.stringify({goal_id:id})}); loadGoals(); } }

(async () => {
  await guardAuth();
  await renderNav();
  await loadGoals();
  document.getElementById('goalForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api.request('api/goals.php', { method: 'POST', body: JSON.stringify({ title: fd.get('title'), details: fd.get('details'), deadline: fd.get('deadline') }) });
      e.target.reset();
      setAlert('goalAlert', 'Goal created.', 'success');
      loadGoals();
    } catch (err) { setAlert('goalAlert', err.message); }
  });
})();
</script>
</body>
</html>
