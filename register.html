<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ELeP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="mainNav"></div>
<main class="py-4"><div class="container"><div class="row justify-content-center"><div class="col-md-6"><div class="card p-4 shadow-sm">
  <h3 class="mb-3">Create your account</h3>
  <div id="formAlert" class="alert d-none"></div>
  <form id="registerForm">
    <div class="form-group"><label>Full Name</label><input class="form-control" name="full_name" required></div>
    <div class="form-group"><label>Email</label><input type="email" class="form-control" name="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" class="form-control" name="password" minlength="6" required></div>
    <button class="btn btn-primary btn-block">Sign Up</button>
  </form>
</div></div></div></div></main>
<script src="assets/js/app.js"></script>
<script>
(async () => {
  await renderNav();
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault(); hideAlert('formAlert');
    const fd = new FormData(e.target);
    try {
      await api.register({ full_name: fd.get('full_name'), email: fd.get('email'), password: fd.get('password') });
      setAlert('formAlert', 'Registration successful. Redirecting to login...', 'success');
      setTimeout(() => location.href = 'login.html', 700);
    } catch (err) { setAlert('formAlert', err.message); }
  });
})();
</script>
</body>
</html>
